<!doctype html>
<html lang="pt" class="dark">
  <head>
    <meta charset="UTF-8" />

    <!-- viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- title -->
    <title>Shopix — Modern Ecommerce</title>

    <!-- SEO -->
    <meta
      name="description"
      content="Shopix é uma loja moderna com os melhores produtos de tecnologia, acessórios e lifestyle."
    />

    <meta name="keywords" content="ecommerce, loja online, tecnologia, acessórios, shopix" />
    <meta name="author" content="Shopix Team" />

    <!-- Open Graph (Facebook / LinkedIn) -->
    <meta property="og:title" content="Shopix — Modern Ecommerce" />
    <meta
      property="og:description"
      content="Descubra produtos incríveis com design moderno e entrega rápida."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/assets/img/shopix-logo-dark.png" />
    <meta property="og:url" content="https://shopix.com" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Shopix — Modern Ecommerce" />
    <meta
      name="twitter:description"
      content="Descubra produtos incríveis com design moderno."
    />
    <meta name="twitter:image" content="/assets/img/shopix-logo-dark.png" />

    <!-- favicon -->
    <link rel="icon" type="image/png" href="/assets/img/shopix-logo-dark.png" />

    <!-- theme color -->
    <meta name="theme-color" content="#000000" />
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
